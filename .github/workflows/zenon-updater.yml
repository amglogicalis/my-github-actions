name: Zenon Updater

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**/*.md'
      - '.zenon_cache.json'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      docs:
        description: 'Archivos de documentación a verificar (opcional, separados por comas)'
        required: false
        default: ''

jobs:
  update-docs:
    name: Run Zenon Updater
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || vars.ZENON_DISABLE_AUTO_UPDATE != 'true'
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Restore cache to get cumulative statistics and codebase knowledge
      - name: Restore Zenon Knowledge Cache
        uses: actions/cache@v4
        with:
          path: .zenon_cache.json
          key: zenon-knowledge-cache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            zenon-knowledge-cache-${{ github.ref_name }}-
            zenon-knowledge-cache-

      - name: Run Zenon Updater Action
        uses: ./.github/actions/updater
        with:
          docs: ${{ github.event.inputs.docs || '' }}
          zenon-api-key: ${{ secrets.ZENON_API_KEY }}
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
          cohere-api-key: ${{ secrets.COHERE_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          samba-api-key: ${{ secrets.SAMBA_API_KEY }}
          cerebras-api-key: ${{ secrets.CEREBRAS_API_KEY }}
          gh-models-token: ${{ secrets.GH_MODELS_TOKEN }}
          token-gh: ${{ secrets.TOKEN_GH }}
