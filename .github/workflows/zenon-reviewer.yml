name: Zenon Reviewer

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      diff-range:
        description: 'Git diff range or commit hash to analyze (optional, e.g. HEAD~1)'
        required: false
        default: ''

jobs:
  review:
    name: Run Zenon Reviewer
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || vars.ZENON_DISABLE_AUTO_REVIEW != 'true'
    
    permissions:
      contents: read
      pull-requests: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Restore cache to get the general codebase context
      - name: Restore Zenon Knowledge Cache
        uses: actions/cache@v4
        with:
          path: .zenon_cache.json
          key: zenon-knowledge-cache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            zenon-knowledge-cache-${{ github.ref_name }}-
            zenon-knowledge-cache-

      - name: Run Zenon Reviewer Action
        uses: ./.github/actions/reviewer
        with:
          diff-range: ${{ github.event.inputs['diff-range'] || '' }}
          zenon-api-key: ${{ secrets.ZENON_API_KEY }}
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
          cohere-api-key: ${{ secrets.COHERE_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          samba-api-key: ${{ secrets.SAMBA_API_KEY }}
          cerebras-api-key: ${{ secrets.CEREBRAS_API_KEY }}
          gh-models-token: ${{ secrets.GH_MODELS_TOKEN }}
          token-gh: ${{ secrets.TOKEN_GH }}
