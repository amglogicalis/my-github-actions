name: 'Zenon AI Assistant'
description: 'Zenon is a free AI assistant that analyzes your repository for bugs/improvements or automatically applies corrections.'
author: 'amglogicalis'
branding:
  icon: 'cpu'
  color: 'purple'

inputs:
  zenon-api-key:
    description: 'Zenon AI API Key (configure as a repository secret)'
    required: true
  mode:
    description: 'Operating mode: "assist" (analyses code & suggests improvements) or "correct" (directly modifies files & commits)'
    required: false
    default: 'assist'
  github-token:
    description: 'GitHub Token for posting PR comments and pushing code changes'
    required: false
    default: '${{ github.token }}'
  exclude:
    description: 'Comma-separated list of file names or paths to exclude from analysis'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Zenon Pre-flight Check
      shell: bash
      run: |
        echo "=== Zenon Pre-flight ==="
        echo "Node version : $(node --version)"
        echo "Working dir  : $(pwd)"
        echo "Action path  : ${{ github.action_path }}"
        echo "Mode         : $INPUT_MODE"
        echo "API Key set  : $([ -n "$INPUT_ZENON_API_KEY" ] && echo 'YES ✅' || echo 'NO ❌')"
        echo "========================"
      env:
        INPUT_ZENON_API_KEY: ${{ inputs.zenon-api-key }}
        INPUT_MODE: ${{ inputs.mode }}

    - name: Run Zenon AI Assistant
      shell: bash
      run: node "${{ github.action_path }}/zenon.js"
      env:
        INPUT_ZENON_API_KEY: ${{ inputs.zenon-api-key }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_EXCLUDE: ${{ inputs.exclude }}
        GITHUB_TOKEN: ${{ inputs.github-token }}

