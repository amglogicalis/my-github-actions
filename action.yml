name: 'Zenon AI Assistant'
description: 'Zenon is a free AI assistant that analyzes your repository for bugs/improvements or automatically applies corrections.'
author: 'amglogicalis'
branding:
  icon: 'cpu'
  color: 'purple'

inputs:
  zenon-api-key:
    description: 'Zenon AI API Key (configure as a repository secret)'
    required: true
  mode:
    description: 'Operating mode: "assist" (analyses code & suggests improvements) or "correct" (directly modifies files & commits)'
    required: false
    default: 'assist'
  github-token:
    description: 'GitHub Token for posting PR comments and pushing code changes (defaults to github.token)'
    required: false
    default: '${{ github.token }}'

  exclude:
    description: 'Comma-separated list of file names or paths to exclude from analysis'
    required: false
    default: ''

runs:
  using: 'node20'
  main: 'zenon.js'
