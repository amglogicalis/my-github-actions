name: 'Zenon AI Assistant'
description: 'Zenon is a free AI assistant that analyzes your repository for bugs/improvements or automatically applies corrections.'
author: 'amglogicalis'
branding:
  icon: 'cpu'
  color: 'purple'

inputs:
  zenon-api-key:
    description: 'Zenon AI API Key (Gemini API - configure as a repository secret)'
    required: false
    default: ''
  groq-api-key:
    description: 'Groq API Key (optional - configure as a repository secret)'
    required: false
    default: ''
  cohere-api-key:
    description: 'Cohere API Key (optional - configure as a repository secret)'
    required: false
    default: ''
  openrouter-api-key:
    description: 'OpenRouter API Key (optional - configure as a repository secret)'
    required: false
    default: ''
  samba-api-key:
    description: 'SambaNova API Key (optional - configure as a repository secret)'
    required: false
    default: ''
  cerebras-api-key:
    description: 'Cerebras API Key (optional - configure as a repository secret)'
    required: false
    default: ''
  gh-models-token:
    description: 'Token for GitHub Models API (GH_MODELS_TOKEN) (optional - configure as a repository secret)'
    required: false
    default: ''
  token-gh:
    description: 'Alternative Token for GitHub Models API (TOKEN_GH) (optional - configure as a repository secret)'
    required: false
    default: ''
  mode:
    description: 'Operating mode: "assist" (analyses code & suggests improvements), "correct" (directly modifies files & commits), "objective" (implements a goal described in a markdown file), "trainer" (trains Zenon on a technology), "updater" (synchronizes documentation) or "tester" (runs & diagnoses tests)'
    required: false
    default: 'assist'
  objective-file:
    description: 'Path (relative to repo root) to the markdown file containing the objective for "objective" mode (default: zenon_objective.md)'
    required: false
    default: 'zenon_objective.md'
  objective:
    description: 'Direct text describing the objective to implement (takes precedence over objective-file)'
    required: false
    default: ''
  topic:
    description: 'The topic, framework, or technology to research and learn in "trainer" mode'
    required: false
    default: ''
  test-cmd:
    description: 'Custom test command to run in "tester" mode (optional). If not set, Zenon auto-detects npm test / pytest / go test.'
    required: false
    default: ''
  auto-fix:
    description: 'If "true", Zenon will attempt to automatically fix failing tests in "tester" mode.'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub Token for posting PR comments and pushing code changes'
    required: false
    default: '${{ github.token }}'
  exclude:
    description: 'Comma-separated list of file names or paths to exclude from analysis'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Zenon Pre-flight Check
      shell: bash
      run: |
        echo "=== Zenon Pre-flight ==="
        echo "Node version : $(node --version)"
        echo "Working dir  : $(pwd)"
        echo "Action path  : ${{ github.action_path }}"
        echo "Mode         : $INPUT_MODE"
        echo "Gemini Key   : $([ -n "$INPUT_ZENON_API_KEY" ] && echo 'set ✅' || echo 'not set ❌')"
        echo "Groq Key     : $([ -n "$INPUT_GROQ_API_KEY" ] && echo 'set ✅' || echo 'not set ❌')"
        echo "Cohere Key   : $([ -n "$INPUT_COHERE_API_KEY" ] && echo 'set ✅' || echo 'not set ❌')"
        echo "OpenRouter   : $([ -n "$INPUT_OPENROUTER_API_KEY" ] && echo 'set ✅' || echo 'not set ❌')"
        echo "Samba Key    : $([ -n "$INPUT_SAMBA_API_KEY" ] && echo 'set ✅' || echo 'not set ❌')"
        echo "Cerebras Key : $([ -n "$INPUT_CEREBRAS_API_KEY" ] && echo 'set ✅' || echo 'not set ❌')"
        echo "GitHubModels : $([ -n "$INPUT_GH_MODELS_TOKEN" -o -n "$INPUT_TOKEN_GH" -o -n "$TOKEN_GH" ] && echo 'set ✅' || echo 'not set ❌')"
        if [ "$INPUT_MODE" = "objective" ]; then
          if [ -n "$INPUT_OBJECTIVE" ]; then
            echo "Objective    : Text ($INPUT_OBJECTIVE)"
          else
            echo "Objective    : File ($INPUT_OBJECTIVE_FILE)"
          fi
        elif [ "$INPUT_MODE" = "trainer" ]; then
          echo "Topic        : $INPUT_TOPIC"
        elif [ "$INPUT_MODE" = "tester" ]; then
          echo "Test Cmd     : ${{ inputs.test-cmd }}"
          echo "Auto Fix     : ${{ inputs.auto-fix }}"
        fi
        echo "========================"
      env:
        INPUT_ZENON_API_KEY: ${{ inputs.zenon-api-key }}
        INPUT_GROQ_API_KEY: ${{ inputs.groq-api-key }}
        INPUT_COHERE_API_KEY: ${{ inputs.cohere-api-key }}
        INPUT_OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        INPUT_SAMBA_API_KEY: ${{ inputs.samba-api-key }}
        INPUT_CEREBRAS_API_KEY: ${{ inputs.cerebras-api-key }}
        INPUT_GH_MODELS_TOKEN: ${{ inputs.gh-models-token }}
        INPUT_TOKEN_GH: ${{ inputs.token-gh }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_TOPIC: ${{ inputs.topic }}
        INPUT_OBJECTIVE: ${{ inputs.objective }}

    - name: Run Zenon AI Assistant
      shell: bash
      run: node "${{ github.action_path }}/src/zenon.js"
      env:
        INPUT_ZENON_API_KEY: ${{ inputs.zenon-api-key }}
        INPUT_GROQ_API_KEY: ${{ inputs.groq-api-key }}
        INPUT_COHERE_API_KEY: ${{ inputs.cohere-api-key }}
        INPUT_OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        INPUT_SAMBA_API_KEY: ${{ inputs.samba-api-key }}
        INPUT_CEREBRAS_API_KEY: ${{ inputs.cerebras-api-key }}
        INPUT_GH_MODELS_TOKEN: ${{ inputs.gh-models-token }}
        INPUT_TOKEN_GH: ${{ inputs.token-gh }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_EXCLUDE: ${{ inputs.exclude }}
        INPUT_OBJECTIVE_FILE: ${{ inputs.objective-file }}
        INPUT_OBJECTIVE: ${{ inputs.objective }}
        INPUT_TOPIC: ${{ inputs.topic }}
        INPUT_TEST_CMD: ${{ inputs.test-cmd }}
        INPUT_AUTO_FIX: ${{ inputs.auto-fix }}
        GITHUB_TOKEN: ${{ inputs.github-token }}

