name: Zenon AI Assistant Self-Test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: 'Zenon Mode — "assist": analyze & report | "correct": auto-fix & commit | "objective": implement a goal | "trainer": train Zenon on a topic'
        required: true
        default: 'assist'
        type: choice
        options:
          - assist
          - correct
          - objective
          - trainer
      objective-file:
        description: 'Path to objective markdown file (only used when mode is "objective")'
        required: false
        default: 'zenon_objective.md'
      topic:
        description: 'The topic, framework, or technology to research and learn (only used when mode is "trainer")'
        required: false
        default: 'Docker multi-stage builds and Node.js optimization'

jobs:
  zenon:
    name: Run Zenon AI
    runs-on: ubuntu-latest
    
    # Required permissions for Zenon to comment on PRs and commit/push modifications
    permissions:
      contents: write
      pull-requests: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history in case git needs history for diffs
          fetch-depth: 0

      # Restores .zenon_cache.json from the last successful run.
      # If no cache exists yet, Zenon will create a fresh one on this run.
      - name: Restore Zenon Knowledge Cache
        uses: actions/cache@v4
        with:
          path: .zenon_cache.json
          key: zenon-knowledge-cache-${{ github.run_id }}
          restore-keys: |
            zenon-knowledge-cache-

      - name: Run Zenon AI Assistant
        uses: ./ # References the local action defined in action.yml of this repo
        with:
          zenon-api-key: ${{ secrets.ZENON_API_KEY }}
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
          cohere-api-key: ${{ secrets.COHERE_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          samba-api-key: ${{ secrets.SAMBA_API_KEY }}
          cerebras-api-key: ${{ secrets.CEREBRAS_API_KEY }}
          gh-models-token: ${{ secrets.GH_MODELS_TOKEN }}
          token-gh: ${{ secrets.TOKEN_GH }}
          mode: ${{ github.event.inputs.mode || 'assist' }}
          objective-file: ${{ github.event.inputs.objective-file || 'zenon_objective.md' }}
          topic: ${{ github.event.inputs.topic || '' }}
